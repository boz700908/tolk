# byctrl配置文件，需要放在调用进程或dll同目录，文件编码utf-8
# #开头的行为注释
# 设置值为1表示启用，为0表示不启用

# 是否使用独立通道朗读
speak.useSlave = 1

# 朗读通道名称，仅当speak.useSlave = 1时生效
# 为空则使用共享三方通道，通道不存在会自动创建
speak.slaveName = 我的三方通道

# 是否始终打断朗读
speak.alwaysInterrupt = 0

# 朗读时是否允许被打断
speak.allowBreak = 1

# 是否启用任意键打断，相当于调用BoyCtrlSetAnyKeyStopSpeaking接口
anyKeyBreak = 0

# 日志文件路径，可由初始化接口参数覆盖
logPath = 
