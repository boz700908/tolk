name: Build

on:
  push:
    branches: ['**']
    tags: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
          - arch: x86
            cmake_arch: Win32

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Setup Java Environment
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Pandoc
        uses: pandoc/actions/setup@v1

      - name: Configure CMake Project
        run: cmake -B build -A ${{ matrix.cmake_arch }}

      - name: Build Project
        run: cmake --build build --config Release

      - name: Stage Build Artifacts
        shell: cmd
        run: |
          mkdir staging
          copy build\src\Release\* staging\
          copy libs\${{ matrix.arch }}\* staging\

      - name: Upload Architecture Artifact
        uses: actions/upload-artifact@v7
        with:
          name: tolk-${{ matrix.arch }}
          path: staging\*

      - name: Upload .NET Library
        if: matrix.arch == 'x64'
        uses: actions/upload-artifact@v7
        with:
          name: tolk-dotnet
          path: build\src\dotnet\*

      - name: Upload Java Archive
        if: matrix.arch == 'x64'
        uses: actions/upload-artifact@v7
        with:
          name: tolk-java
          path: build\src\java\*

      - name: Upload Documentation
        if: matrix.arch == 'x64'
        uses: actions/upload-artifact@v7
        with:
          name: tolk-docs
          path: build\docs\*

  package:
    name: Create Release Package
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Download All Build Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare Release Package
        shell: cmd
        run: |
          mkdir dist\x86
          mkdir dist\x64
          xcopy /E /Y artifacts\tolk-x86\* dist\x86\
          xcopy /E /Y artifacts\tolk-x64\* dist\x64\
          xcopy /E /Y artifacts\tolk-dotnet\* dist\
          xcopy /E /Y artifacts\tolk-java\* dist\
          xcopy /E /Y artifacts\tolk-docs\* dist\
          copy LICENSE* dist\

      - name: Compress Release Package
        shell: cmd
        run: |
          cd dist
          tar -a -c -f tolk.zip *

      - name: Upload Compressed Archive
        uses: actions/upload-artifact@v7
        with:
          name: tolk-dist
          path: dist\tolk.zip

  release:
    name: Create Release
    needs: package
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Download Release Package
        uses: actions/download-artifact@v8
        with:
          name: tolk-dist

      - name: Initialize Release Information
        id: release_info
        run: |
          echo "TITLE=Tolk-${{ github.sha }}" >> $env:GITHUB_ENV
          echo "BODY=Commit Hash: ${{ github.sha }} Target Branch: ${{ github.ref_name }}" >> $env:GITHUB_ENV

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: release-build
          name: ${{ env.TITLE }}
          body: ${{ env.BODY }}
          files: tolk.zip
          draft: false
          prerelease: false