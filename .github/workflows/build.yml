name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
          - arch: x86
            cmake_arch: Win32

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Pandoc
        uses: pandoc/actions/setup@v1

      - name: Configure CMake
        run: cmake -B build -A ${{ matrix.cmake_arch }}

      - name: Build
        run: cmake --build build --config Release

      - name: Stage arch artifact
        shell: cmd
        run: |
          mkdir staging
          copy build\src\Release\Tolk.dll staging\
          copy build\src\Release\Tolk.lib staging\
          copy libs\${{ matrix.arch }}\* staging\

      - name: Upload arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: tolk-${{ matrix.arch }}
          path: staging\*

      - name: Upload .NET DLL artifact
        if: matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: tolk-dotnet
          path: build\src\dotnet\TolkDotNet.dll

      - name: Upload Java JAR artifact
        if: matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: tolk-java
          path: build\src\java\Tolk.jar

      - name: Upload documentation artifact
        if: matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: tolk-docs
          path: build\docs\README.html

  package:
    name: Create Distribution Archive
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare distribution
        shell: cmd
        run: |
          mkdir dist\x86
          mkdir dist\x64
          xcopy /Y artifacts\tolk-x86\* dist\x86\
          xcopy /Y artifacts\tolk-x64\* dist\x64\
          if exist artifacts\tolk-dotnet\TolkDotNet.dll copy artifacts\tolk-dotnet\TolkDotNet.dll dist\
          if exist artifacts\tolk-java\Tolk.jar copy artifacts\tolk-java\Tolk.jar dist\
          if exist artifacts\tolk-docs\README.html copy artifacts\tolk-docs\README.html dist\
          if exist LICENSE*.txt copy LICENSE*.txt dist\

      - name: Create archive
        shell: cmd
        run: 7z a tolk.zip .\dist\*

      - name: Upload distribution archive
        uses: actions/upload-artifact@v4
        with:
          name: tolk-dist
          path: tolk.zip

  release:
    name: Create Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download distribution archive
        uses: actions/download-artifact@v4
        with:
          name: tolk-dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: tolk-${{ github.ref_name }}
          files: tolk.zip
          draft: false
          prerelease: false
